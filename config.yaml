# GraphGen Configuration

# Test Mode Configuration
test_mode:
  enabled: true
  max_documents: 1

# Infrastructure & Integration
infra:
  graph_db_type: "neo4j"
  falkordb_host: "falkordb"
  falkordb_port: 6379
  postgres_host: "pgvector"
  postgres_port: 5432
  neo4j_host: "neo4j"
  neo4j_port: 7687
  neo4j_user: "neo4j"
  neo4j_password: "password"
  input_dir: "/app/input/txt/translated"
  output_dir: "/app/output"
  clean_start: true

# LLM Configuration
llm:
  base_model: "llama-3.1-8b-instant"
  extraction_model: "meta-llama/llama-4-scout-17b-16e-instruct"
  summarization_model: "llama-3.3-70b-versatile"
  temperature: 0.1

# Extraction Settings
extraction:
  chunk_size: 512
  chunk_overlap: 64
  backend: "gliner"
  gliner_model: "urchade/gliner_large-v2"
  device: "cuda"
  use_onnx: false
  hierarchy_levels:
    - "COMMUNITY"
    - "SUBCOMMUNITY"
  entity_labels: ["Person", "Organization", "Location", "Policy", "Event", "Concept"]
  ontology:
    enabled: true
    ontology_dir: "/app/input/ontology/cdm-4.13.2"
    namespace_filter: null
    merge_with_manual: true
    top_level_only: true
    min_subclasses: 1
    include_local_names: true
  file_pattern: "*.txt"

# Graph Schema is hardcoded in graphgen/config/schema.py

kge:
  enabled: true
  model: "RGCN"
  embedding_dim: 128
  learning_rate: 0.01
  num_epochs: 50
  early_stopping_patience: 5

community:
  resolutions: [0.5] # Reduced for speed
  n_iterations: 2 # Reduced for speed
  min_community_size: 3
  seed: 42

# Analytics & Visualization
analytics:
  enabled: true
  output_dir: "analytics_reports"
  kge_comparison:
    enabled: false # Set to true to run comprehensive model check
    models: ["TransE", "DistMult"]
    epochs: 20
  visualization:
    interactive: true
    heatmap: true

# Iterative Experiment Configuration - Smoke Test
iterative:
  enabled: true
  batch_size: 5
  iterations: 3
  random_seed: 42
