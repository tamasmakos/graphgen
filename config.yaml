# GraphGen Configuration

# Test Mode Configuration
test_mode:
  enabled: true
  max_documents: 1

# Infrastructure & Integration
infra:
  graph_db_type: "neo4j"
  # neo4j_host: "neo4j" # Handled via .env (NEO4J_HOST)
  # neo4j_port: 7687 # Handled via .env (NEO4J_PORT)
  neo4j_user: "neo4j"
  neo4j_password: "password"
  input_dir: "input/txt/translated"
  output_dir: "output"
  clean_start: true

# LLM Configuration
llm:
  base_model: "llama-3.1-8b-instant"
  extraction_model: "meta-llama/llama-4-scout-17b-16e-instruct"
  summarization_model: "llama-3.1-8b-instant"
  temperature: 0.0

# Extraction Settings
extraction:
  chunk_size: 512
  chunk_overlap: 64
  backend: "dspy"
  gliner_model: "knowledgator/gliner-multitask-large-v0.5"
  device: "cuda"
  use_onnx: false
  hierarchy_levels:
    - "COMMUNITY"
    - "SUBCOMMUNITY"
  ontology:
    enabled: true
    ontology_dir: "input/ontology/cdm-4.13.2"
    namespace_filter: null
    merge_with_manual: true
    top_level_only: true
    min_subclasses: 1
    include_local_names: true
  file_pattern: "*.txt"

# Graph Schema is hardcoded in graphgen/config/schema.py

community:
  resolutions: [0.5] # Reduced for speed
  n_iterations: 2 # Reduced for speed
  min_community_size: 3
  seed: 42
  
  # Node2Vec Config
  node2vec_enabled: true
  node2vec_dimensions: 64
  node2vec_walk_length: 16
  node2vec_num_walks: 20

# Analytics & Visualization
analytics:
  enabled: true
  output_dir: "analytics_reports"
  run_separation_report: true
  # Silhouette thresholds for topic separation analysis
  silhouette_min_samples: 3
  silhouette_min_samples_per_cluster: 2
  silhouette_max_clusters_ratio: 0.5
  visualization:
    interactive: true
    heatmap: true

# Iterative Experiment Configuration - Smoke Test
iterative:
  enabled: true
  batch_size: 3
  iterations: 4
  random_seed: 42
