services:
  # --- Infrastructure ---
  langfuse-server:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=mysecret
      - SALT=mysalt
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false
    restart: always

  langfuse-db:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U langfuse -d langfuse" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - langfuse_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.26.20-ubi10
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
    restart: always

  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    command: tail -f /dev/null
    depends_on:
      - neo4j
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

volumes:
  langfuse_data:
  neo4j_data:
